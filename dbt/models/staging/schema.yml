sources:
  - name: sih_raw
    description:  |
      Raw SIH/RD hospitalization data from DATASUS (Brazilian Ministry of Health).
      Files are downloaded from the DATASUS FTP server and stored as parquet in GCS.
      Currently covers São Paulo state for 2024.
    schema: sih_raw
    tables:
      - name: internacoes
        description:  |
          Hospitalization records partitioned by year and state. The Hive partition columns
          'year' and 'state' are automatically exposed by BigQuery from the GCS folder structure
          and are queryable as regular columns despite not being stored in the parquet files.
models:
  - name: stg_sih_rd
    description: "Staging model for SIH/RD data, with type casting and column standardization."
    columns:
    - name: diag_princ
      description: "Primary diagnosis code (CID-10)."
      data_tests:
        - not_null
    - name: morte
      data_tests:
        - not_null
        - accepted_values:
            arguments:
              values: [0,1]
              quote: false
      